    const quizContent = document.getElementById('quiz-content');

    // UI Render Logic
    function loadQuiz() {
        quizData.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            
            // Question Title
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = item.q;
            block.appendChild(title);

            // Options
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            item.opt.forEach((optionText, optIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                // Using input radio inline
                label.innerHTML = `<input type="radio" name="q${index}" value="${optIndex}"> ${optionText}`;
                optionsDiv.appendChild(label);
            });
            
            block.appendChild(optionsDiv);
            quizContent.appendChild(block);
        });
    }

    // Score Calculation Logic
    function calculateScore() {
        let score = 0;
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && parseInt(selected.value) === item.ans) {
                score++;
            }
        });

        // Hide quiz, show results
        document.getElementById('quiz-header').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        const scoreDisplay = document.getElementById('result-score');
        
        resultBox.style.display = 'block';
        scoreDisplay.innerText = `You scored ${score} out of ${quizData.length}`;
        
        // Window scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
