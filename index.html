<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Top 30 MCQs Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .quiz-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h2 { 
            text-align: center; 
            color: #1a73e8; 
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .question-block {
            margin-bottom: 30px;
            padding: 15px;
            background: #f9fbfc;
            border-radius: 8px;
            border-left: 4px solid #1a73e8;
        }
        .question-title { 
            font-size: 1.1em; 
            margin-bottom: 15px; 
            font-weight: 600; 
            color: #202124;
        }
        .options { margin-bottom: 10px; }
        .option-label {
            display: block;
            background: #ffffff;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .option-label:hover { 
            background: #e8f0fe; 
            border-color: #1a73e8;
        }
        input[type="radio"] { 
            margin-right: 12px; 
            transform: scale(1.2);
            cursor: pointer;
        }
        .btn-submit {
            background: #1a73e8; 
            color: white; 
            border: none;
            padding: 15px 25px; 
            font-size: 1.1em; 
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-submit:hover { 
            background: #1557b0; 
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
        }
        #result-box {
            display: none; 
            text-align: center; 
            padding: 40px 20px;
        }
        #result-score {
            font-size: 2em; 
            font-weight: bold; 
            color: #188038;
            margin-bottom: 10px;
        }
        #result-msg {
            font-size: 1.2em;
            color: #5f6368;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-header">
        <h2>Data Structures Test (Top 30 Questions)</h2>
        <div id="quiz-content"></div>
        <button class="btn-submit" id="submitBtn" onclick="calculateScore()">Submit Test</button>
    </div>
    
    <div id="result-box">
        <div id="result-score"></div>
        <div id="result-msg">Test successfully submitted!</div>
        <button class="btn-submit" style="margin-top: 30px; width: 50%;" onclick="location.reload()">Restart Test</button>
    </div>
</div>

<script>
    // 30 Handpicked "Good" Questions with proper answers
    const quizData = [
        // Basics & Searching (5)
        { q: "1. Data structure ka main purpose kya hota hai?", opt: ["Data delete karna", "Data organize karna", "Data print karna", "Data hide karna"], ans: 1 }, // [cite: 2, 3, 4, 5, 6]
        { q: "2. Kaunsa linear data structure hai?", opt: ["Tree", "Graph", "Array", "Heap"], ans: 2 }, // [cite: 7, 8, 9, 10, 11]
        { q: "3. Worst case complexity kya hoti hai?", opt: ["Minimum", "Maximum", "Average", "None"], ans: 1 }, // [cite: 67, 68, 69, 70, 71]
        { q: "4. Linear search ka time complexity kya hai?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 }, // [cite: 82, 83, 84, 85, 86]
        { q: "5. Binary search ka time complexity kya hai?", opt: ["O(n)", "O(log n)", "O(n²)", "O(1)"], ans: 1 }, // [cite: 87, 88, 89, 90, 91]

        // Arrays (5)
        { q: "6. Array me elements kaise store hote hain?", opt: ["Random", "Sequential", "Linked", "None"], ans: 1 }, // [cite: 102, 103, 104, 105, 106]
        { q: "7. Array me insertion ka time complexity worst case me kya hai?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 }, // [cite: 112, 113, 114, 115, 116]
        { q: "8. Array ka size kya hota hai?", opt: ["Dynamic", "Fixed", "Random", "Infinite"], ans: 1 }, // [cite: 132, 133, 134, 135, 136]
        { q: "9. Kadane's algorithm kis ke liye use hota hai?", opt: ["Sorting", "Max subarray sum", "Searching", "Graph"], ans: 1 }, // [cite: 172, 173, 174, 175, 176]
        { q: "10. Binary search me mid ka formula kya hai?", opt: ["(l+r)/2", "l*r", "l+r", "None"], ans: 0 }, // [cite: 187, 188, 189, 190, 191, 192]

        // Linked List (5)
        { q: "11. Linked list me memory kaise allocate hoti hai?", opt: ["Contiguous", "Non-contiguous", "Fixed", "None"], ans: 1 }, // [cite: 203, 204, 205, 206, 207]
        { q: "12. Doubly linked list me pointers kitne hote hain?", opt: ["1", "2", "3", "4"], ans: 1 }, // [cite: 223, 224, 225, 226, 227]
        { q: "13. Linked list reversal ka time complexity kya hai?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 }, // [cite: 243, 244, 245, 246, 247]
        { q: "14. Middle element find ka approach kya hai?", opt: ["Loop", "Slow-fast pointer", "Sorting", "None"], ans: 1 }, // [cite: 253, 254, 255, 256, 257]
        { q: "15. Linked list me deletion ka time kya hai?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 }, // [cite: 288, 289, 290, 291, 292]

        // Stacks (5)
        { q: "16. Stack ka principle kya hota hai?", opt: ["FIFO", "LIFO", "Random", "None"], ans: 1 }, // [cite: 303, 304, 305, 306, 307]
        { q: "17. Stack overflow kab hota hai?", opt: ["Empty ho", "Full ho", "Sorted ho", "None"], ans: 1 }, // [cite: 323, 324, 325, 326, 327]
        { q: "18. Infix to postfix conversion me kya use hota hai?", opt: ["Queue", "Stack", "Array", "Graph"], ans: 1 }, // [cite: 338, 339, 340, 341, 342]
        { q: "19. Function call me kya use hota hai?", opt: ["Queue", "Stack", "Tree", "Graph"], ans: 1 }, // [cite: 343, 344, 345, 346, 347]
        { q: "20. Stack ka implementation kis se hota hai?", opt: ["Array", "Linked list", "Both", "None"], ans: 2 }, // [cite: 348, 349, 350, 351, 352]

        // Queues (4)
        { q: "21. Queue ka principle kya hota hai?", opt: ["LIFO", "FIFO", "Random", "None"], ans: 1 }, // [cite: 353, 354, 355, 356, 357]
        { q: "22. Queue ka front element kaha se remove hota hai?", opt: ["Front", "Rear", "Middle", "None"], ans: 0 }, // [cite: 368, 369, 370, 371, 372]
        { q: "23. Priority queue me kaunsa element remove hota hai?", opt: ["First", "Last", "Highest priority", "Random"], ans: 2 }, // [cite: 383, 384, 385, 386, 387]
        { q: "24. Queue ka use kaha hota hai?", opt: ["Scheduling", "Buffer", "BFS", "All"], ans: 3 }, // [cite: 388, 389, 390, 391, 392]

        // Trees (4)
        { q: "25. Tree ek kaisa data structure hai?", opt: ["Linear", "Non-linear", "Static", "None"], ans: 1 }, // [cite: 403, 404, 405, 406, 407]
        { q: "26. Tree traversal ke types kaun se hain?", opt: ["Inorder", "Preorder", "Postorder", "All"], ans: 3 }, // [cite: 428, 429, 430, 431, 432]
        { q: "27. BST ka full form kya hai?", opt: ["Binary Search Tree", "Binary Sort Tree", "Both", "None"], ans: 0 }, // [cite: 433, 434, 435, 436, 437]
        { q: "28. BST me left child ka relation kya hota hai?", opt: ["Greater", "Smaller", "Equal", "None"], ans: 1 }, // [cite: 438, 439, 440, 441, 442]

        // Graphs (2)
        { q: "29. BFS ka full form kya hai?", opt: ["Breadth First Search", "Binary First Search", "Both", "None"], ans: 0 }, // [cite: 473, 474, 475, 476, 477]
        { q: "30. BFS me kaunsa data structure use hota hai?", opt: ["Stack", "Queue", "Array", "Tree"], ans: 1 } // [cite: 483, 484, 485, 486, 487]
    ];

    const quizContent = document.getElementById('quiz-content');

    function loadQuiz() {
        quizData.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = item.q;
            block.appendChild(title);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            item.opt.forEach((optionText, optIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.innerHTML = `<input type="radio" name="q${index}" value="${optIndex}"> ${optionText}`;
                optionsDiv.appendChild(label);
            });
            
            block.appendChild(optionsDiv);
            quizContent.appendChild(block);
        });
    }

    function calculateScore() {
        let score = 0;
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && parseInt(selected.value) === item.ans) {
                score++;
            }
        });

        document.getElementById('quiz-header').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        const scoreDisplay = document.getElementById('result-score');
        
        resultBox.style.display = 'block';
        scoreDisplay.innerText = `You scored ${score} / 30`;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuiz();
</script>

</body>
</html>
