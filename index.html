<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Top 30 MCQs Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .quiz-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h2 { 
            text-align: center; 
            color: #1a73e8; 
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .question-block {
            margin-bottom: 30px;
            padding: 15px;
            background: #f9fbfc;
            border-radius: 8px;
            border-left: 4px solid #1a73e8;
        }
        .question-title { 
            font-size: 1.1em; 
            margin-bottom: 15px; 
            font-weight: 600; 
            color: #202124;
        }
        .options { margin-bottom: 10px; }
        .option-label {
            display: block;
            background: #ffffff;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .option-label:hover { 
            background: #e8f0fe; 
            border-color: #1a73e8;
        }
        input[type="radio"] { 
            margin-right: 12px; 
            transform: scale(1.2);
            cursor: pointer;
        }
        .btn-submit {
            background: #1a73e8; 
            color: white; 
            border: none;
            padding: 15px 25px; 
            font-size: 1.1em; 
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-submit:hover { 
            background: #1557b0; 
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
        }
        #result-box {
            display: none; 
            text-align: center; 
            padding: 40px 20px;
        }
        #result-score {
            font-size: 2em; 
            font-weight: bold; 
            color: #188038;
            margin-bottom: 10px;
        }
        #result-msg {
            font-size: 1.2em;
            color: #5f6368;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-header">
        <h2>Data Structures Test (Top 30 Questions)</h2>
        <div id="quiz-content"></div>
        <button class="btn-submit" id="submitBtn" onclick="calculateScore()">Submit Test</button>
    </div>
    
    <div id="result-box">
        <div id="result-score"></div>
        <div id="result-msg">Test successfully submitted!</div>
        <button class="btn-submit" style="margin-top: 30px; width: 50%;" onclick="location.reload()">Restart Test</button>
    </div>
</div>

<script>
    // 30 Handpicked Questions Translated to English
    const quizData = [
        // Basics & Searching (5)
        { q: "1. What is the main purpose of a data structure?", opt: ["To delete data", "To organize data efficiently", "To print data", "To hide data"], ans: 1 },
        { q: "2. Which of the following is a linear data structure?", opt: ["Tree", "Graph", "Array", "Heap"], ans: 2 },
        { q: "3. What does worst-case time complexity represent?", opt: ["Minimum time required", "Maximum time required", "Average time required", "None of the above"], ans: 1 },
        { q: "4. What is the time complexity of linear search?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 },
        { q: "5. What is the time complexity of binary search?", opt: ["O(n)", "O(log n)", "O(n²)", "O(1)"], ans: 1 },

        // Arrays (5)
        { q: "6. How are elements stored in an array?", opt: ["Randomly", "In contiguous memory locations", "Linked via pointers", "None of the above"], ans: 1 },
        { q: "7. What is the worst-case time complexity for insertion in an array?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 },
        { q: "8. What is the characteristic of a standard array's size?", opt: ["It is dynamic", "It is fixed", "It is random", "It is infinite"], ans: 1 },
        { q: "9. What is Kadane's algorithm primarily used for?", opt: ["Sorting an array", "Finding the maximum subarray sum", "Searching an element", "Graph traversal"], ans: 1 },
        { q: "10. What is the mathematical formula to calculate 'mid' in binary search?", opt: ["(low + high) / 2", "low * high", "low + high", "None of the above"], ans: 0 },

        // Linked List (5)
        { q: "11. How is memory allocated in a linked list?", opt: ["Contiguously", "Non-contiguously (Dynamically)", "Fixed at compile time", "None of the above"], ans: 1 },
        { q: "12. How many pointers does a node in a doubly linked list contain?", opt: ["1", "2", "3", "4"], ans: 1 },
        { q: "13. What is the time complexity of reversing a singly linked list?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 },
        { q: "14. What is the best approach to find the middle element of a linked list in a single pass?", opt: ["Using a standard loop", "Using a slow and fast pointer", "Sorting the list", "None of the above"], ans: 1 },
        { q: "15. What is the worst-case time complexity for deletion of an element in a singly linked list?", opt: ["O(1)", "O(n)", "O(log n)", "O(n²)"], ans: 1 },

        // Stacks (5)
        { q: "16. What is the working principle of a Stack?", opt: ["FIFO (First In First Out)", "LIFO (Last In First Out)", "Random Access", "None of the above"], ans: 1 },
        { q: "17. When does a Stack Overflow condition occur?", opt: ["When the stack is empty", "When the stack is full", "When the stack is sorted", "None of the above"], ans: 1 },
        { q: "18. Which data structure is used for infix to postfix conversion?", opt: ["Queue", "Stack", "Array", "Graph"], ans: 1 },
        { q: "19. Which data structure is utilized internally to manage function calls in memory?", opt: ["Queue", "Stack", "Tree", "Graph"], ans: 1 },
        { q: "20. How can a stack be implemented?", opt: ["Using Arrays only", "Using Linked Lists only", "Using either Arrays or Linked Lists", "None of the above"], ans: 2 },

        // Queues (4)
        { q: "21. What is the working principle of a Queue?", opt: ["LIFO (Last In First Out)", "FIFO (First In First Out)", "Random Access", "None of the above"], ans: 1 },
        { q: "22. From which end is an element removed in a standard Queue?", opt: ["From the Front", "From the Rear", "From the Middle", "None of the above"], ans: 0 },
        { q: "23. Which element is removed first in a Priority Queue?", opt: ["The first element inserted", "The last element inserted", "The element with the highest priority", "A random element"], ans: 2 },
        { q: "24. What are the common applications of a Queue?", opt: ["CPU Scheduling", "Buffer Management", "Breadth-First Search (BFS)", "All of the above"], ans: 3 },

        // Trees (4)
        { q: "25. What type of data structure is a Tree?", opt: ["Linear", "Non-linear", "Static", "None of the above"], ans: 1 },
        { q: "26. Which of the following are valid types of binary tree traversals?", opt: ["Inorder", "Preorder", "Postorder", "All of the above"], ans: 3 },
        { q: "27. What does BST stand for?", opt: ["Binary Search Tree", "Binary Sort Tree", "Both A and B", "None of the above"], ans: 0 },
        { q: "28. In a Binary Search Tree (BST), what is the relationship of the left child to its parent?", opt: ["It is greater than the parent", "It is smaller than the parent", "It is equal to the parent", "None of the above"], ans: 1 },

        // Graphs (2)
        { q: "29. What does BFS stand for in Graph theory?", opt: ["Breadth-First Search", "Binary First Search", "Both A and B", "None of the above"], ans: 0 },
        { q: "30. Which data structure is primarily used to implement Breadth-First Search (BFS)?", opt: ["Stack", "Queue", "Array", "Tree"], ans: 1 }
    ];

    const quizContent = document.getElementById('quiz-content');

    function loadQuiz() {
        quizData.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = item.q;
            block.appendChild(title);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            item.opt.forEach((optionText, optIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.innerHTML = `<input type="radio" name="q${index}" value="${optIndex}"> ${optionText}`;
                optionsDiv.appendChild(label);
            });
            
            block.appendChild(optionsDiv);
            quizContent.appendChild(block);
        });
    }

    function calculateScore() {
        let score = 0;
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && parseInt(selected.value) === item.ans) {
                score++;
            }
        });

        document.getElementById('quiz-header').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        const scoreDisplay = document.getElementById('result-score');
        
        resultBox.style.display = 'block';
        scoreDisplay.innerText = `You scored ${score} / 30`;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuiz();
</script>

</body>
</html>
